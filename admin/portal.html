<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Invoice — Smart Lawn NY</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#6abb1e;--dark:#1d1d1f;--g100:#f3f4f6;--g200:#e5e7eb;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g800:#1f2937;--red:#ef4444;--blue:#3b82f6;--orange:#f59e0b;}
body{font-family:'Inter',sans-serif;background:var(--g100);color:var(--g800);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.invoice-card{background:#fff;border-radius:16px;max-width:600px;width:100%;box-shadow:0 10px 25px rgba(0,0,0,.1);overflow:hidden;}
.inv-header{background:linear-gradient(135deg,#1d1d1f,#2d3748);color:#fff;padding:32px;text-align:center;}
.inv-header .brand{font-size:1.5rem;font-weight:800;margin-bottom:4px;}
.inv-header .brand span{color:var(--green);}
.inv-header .sub{font-size:.8rem;color:#9ca3af;}
.inv-body{padding:32px;}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.inv-meta .item{font-size:.85rem;}
.inv-meta .item .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);font-weight:600;margin-bottom:2px;}
.inv-meta .item .val{font-weight:600;}
.inv-line{display:flex;justify-content:space-between;padding:8px 0;font-size:.9rem;border-bottom:1px solid var(--g100);}
.inv-line.total{font-size:1.3rem;font-weight:800;border-top:2px solid var(--dark);border-bottom:none;padding-top:12px;margin-top:8px;}
.inv-divider{height:1px;background:var(--g200);margin:16px 0;}
.badge{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;display:inline-block;}
.badge-paid{background:#dcfce7;color:#166534;}
.badge-sent,.badge-viewed{background:#dbeafe;color:#1e40af;}
.badge-overdue{background:#fecaca;color:#991b1b;}
.badge-draft{background:var(--g200);color:var(--g600);}
.pay-section{background:var(--g100);border-radius:12px;padding:20px;margin-top:24px;}
.pay-section h3{font-size:.95rem;margin-bottom:12px;}
.pay-option{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:.88rem;}
.pay-option i{color:var(--green);width:20px;text-align:center;}
.inv-footer{text-align:center;padding:16px 32px 24px;font-size:.8rem;color:var(--g500);}
.loading{text-align:center;padding:60px;color:var(--g500);}
.loading i{font-size:2rem;margin-bottom:12px;color:var(--green);}
.error{text-align:center;padding:60px;color:var(--red);}
@media print{
  body{background:#fff;padding:0;}
  .invoice-card{box-shadow:none;max-width:100%;}
  .pay-section,.inv-footer{display:none;}
}
</style>
</head>
<body>
<div class="invoice-card" id="invoiceCard">
  <div class="loading" id="loading">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading invoice...</p>
  </div>
</div>

<script>
var SB='https://hsjodrniizoctxsznjsy.supabase.co';
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhzam9kcm5paXpvY3R4c3puanN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODkxNzUsImV4cCI6MjA5MDA2NTE3NX0.Yu8JUBc5TQrVr_1XsAVHsr66LiZZrMEgeYZ8dog1VWk';

function sb(path){
  return fetch(SB+'/rest/v1/'+path,{
    headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}
  }).then(function(r){return r.json();});
}

function money(n){return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return '—';return new Date(d).toLocaleDateString();}
function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

function init(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){
    document.getElementById('invoiceCard').innerHTML='<div class="error"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:12px;"></i><p>No invoice ID provided</p></div>';
    return;
  }

  sb('invoices?id=eq.'+id+'&select=*').then(function(data){
    if(!data||!data.length){
      document.getElementById('invoiceCard').innerHTML='<div class="error"><i class="fas fa-file-excel" style="font-size:2rem;margin-bottom:12px;"></i><p>Invoice not found</p></div>';
      return;
    }
    var inv=data[0];
    document.title='Invoice '+esc(inv.invoice_number||'')+' — Smart Lawn NY';

    // Mark as viewed
    if(inv.status==='sent'){
      fetch(SB+'/rest/v1/invoices?id=eq.'+id,{
        method:'PATCH',
        headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify({status:'viewed'})
      });
    }

    var overdue=inv.due_date&&inv.status!=='paid'&&inv.status!=='cancelled'&&new Date(inv.due_date)<new Date();
    var statusClass=inv.status==='paid'?'paid':overdue?'overdue':inv.status==='sent'||inv.status==='viewed'?'sent':'draft';

    var html='<div class="inv-header">';
    html+='<div class="brand">🌿 <span>Smart Lawn</span> NY</div>';
    html+='<div class="sub">smartlawnny.com • (914) 647-7276</div>';
    html+='</div>';

    html+='<div class="inv-body">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">';
    html+='<div><div style="font-size:1.4rem;font-weight:800;">INVOICE</div><div style="font-size:.9rem;color:var(--g500);">'+esc(inv.invoice_number||'')+'</div></div>';
    html+='<span class="badge badge-'+statusClass+'">'+(overdue?'OVERDUE':inv.status.toUpperCase())+'</span>';
    html+='</div>';

    html+='<div class="inv-meta">';
    html+='<div class="item"><div class="label">Bill To</div><div class="val">'+esc(inv.customer_name||'')+'</div></div>';
    html+='<div class="item"><div class="label">Date</div><div class="val">'+fmtDate(inv.created_at)+'</div></div>';
    if(inv.customer_email) html+='<div class="item"><div class="label">Email</div><div class="val">'+esc(inv.customer_email)+'</div></div>';
    html+='<div class="item"><div class="label">Due Date</div><div class="val" style="'+(overdue?'color:var(--red);':'')+'">'+fmtDate(inv.due_date)+'</div></div>';
    if(inv.customer_address) html+='<div class="item"><div class="label">Address</div><div class="val">'+esc(inv.customer_address)+'</div></div>';
    html+='</div>';

    html+='<div class="inv-divider"></div>';
    html+='<div class="inv-line"><span>Subtotal</span><span>'+money(inv.subtotal)+'</span></div>';
    if(inv.discount>0) html+='<div class="inv-line"><span>Discount</span><span>-'+money(inv.discount)+'</span></div>';
    html+='<div class="inv-line"><span>Tax</span><span>'+money(inv.tax)+'</span></div>';
    html+='<div class="inv-line total"><span>TOTAL DUE</span><span>'+money(inv.total)+'</span></div>';

    if(inv.notes) html+='<div style="margin-top:16px;font-size:.85rem;color:var(--g500);padding:10px;background:var(--g100);border-radius:8px;"><i class="fas fa-sticky-note" style="margin-right:6px;"></i>'+esc(inv.notes)+'</div>';

    if(inv.status!=='paid'){
      // Stripe Pay Now button
      html+='<div style="margin-top:24px;text-align:center;">';
      html+='<button onclick="payWithStripe(\''+esc(inv.invoice_number||'')+'\','+inv.total+')" style="display:block;width:100%;padding:16px;background:#6abb1e;color:#fff;border:none;border-radius:980px;font-weight:700;font-size:1.1rem;cursor:pointer;font-family:inherit;margin-bottom:16px;"><i class="fas fa-lock" style="margin-right:8px;"></i>Pay $'+Number(inv.total||0).toFixed(2)+' Now — Secure Checkout</button>';
      html+='</div>';
      html+='<div class="pay-section">';
      html+='<h3><i class="fas fa-wallet" style="color:var(--green);margin-right:6px;"></i>Other Payment Options</h3>';
      html+='<div class="pay-option"><i class="fas fa-mobile-alt"></i><div><strong>Venmo</strong>: @SmartLawnNY</div></div>';
      html+='<div class="pay-option"><i class="fas fa-university"></i><div><strong>Zelle</strong>: smartlawnny@gmail.com</div></div>';
      html+='<div class="pay-option"><i class="fas fa-check"></i><div><strong>Check</strong>: Payable to "Smart Lawn NY"</div></div>';
      html+='<div class="pay-option"><i class="fas fa-phone"></i><div><strong>Call</strong>: (914) 647-7276</div></div>';
      html+='</div>';
    } else {
      html+='<div style="text-align:center;margin-top:24px;padding:16px;background:#dcfce7;border-radius:12px;"><i class="fas fa-check-circle" style="color:#166534;font-size:1.5rem;"></i><div style="font-weight:700;color:#166534;margin-top:4px;">Payment Received</div><div style="font-size:.8rem;color:#166534;">Thank you!</div></div>';
    }

    html+='</div>';
    html+='<div class="inv-footer">Thank you for choosing Smart Lawn NY!<br><button onclick="window.print()" style="margin-top:8px;padding:8px 20px;background:var(--green);color:#fff;border:none;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer;"><i class="fas fa-print"></i> Print Invoice</button></div>';

    document.getElementById('invoiceCard').innerHTML=html;
  }).catch(function(e){
    document.getElementById('invoiceCard').innerHTML='<div class="error"><i class="fas fa-exclamation-triangle" style="font-size:2rem;margin-bottom:12px;"></i><p>Error loading invoice</p><p style="font-size:.8rem;">'+esc(e.message)+'</p></div>';
  });
}

function payWithStripe(invoiceNum, total){
  // Redirect to call — Stripe payment links created from POS admin
  var btn=event.target;
  btn.textContent='Call (914) 647-7276 to pay by card';
  btn.style.background='#1d1d1f';
  setTimeout(function(){window.location.href='tel:9146477276';},1000);
}

init();
</script>
</body>
</html>
