<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/images/logo.png">
<meta name="theme-color" content="#6abb1e">
<title>Smart Lawn NY — POS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green:#6abb1e;--green-dark:#5a9e18;--green-light:#e8f5d6;
  --dark:#1d1d1f;--white:#fff;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
  --red:#ef4444;--red-light:#fef2f2;--blue:#3b82f6;--blue-light:#eff6ff;--orange:#f59e0b;--orange-light:#fffbeb;--purple:#8b5cf6;--teal:#14b8a6;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 6px rgba(0,0,0,.07);--shadow-lg:0 10px 15px rgba(0,0,0,.1);
  --radius:10px;--radius-lg:14px;
  --sidebar-w:240px;
}
body{font-family:'Inter',sans-serif;background:var(--g100);color:var(--g800);min-height:100vh;overflow:hidden;}
a{color:var(--green);text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}

/* ============ LOGIN ============ */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1d1d1f 0%,#2d3748 100%);}
.login-card{background:var(--white);border-radius:20px;padding:48px 40px;max-width:380px;width:90%;box-shadow:var(--shadow-lg);text-align:center;}
.login-card .logo{font-size:2.2rem;margin-bottom:8px;}
.login-card h1{font-size:1.4rem;font-weight:800;margin-bottom:2px;}
.login-card .sub{font-size:.85rem;color:var(--g500);margin-bottom:32px;}
.login-card input{width:100%;padding:14px 16px;border:2px solid var(--g200);border-radius:var(--radius);font-size:1rem;margin-bottom:16px;transition:border .2s;}
.login-card input:focus{outline:none;border-color:var(--green);}
.login-card button{width:100%;padding:14px;background:var(--green);color:var(--white);border:none;border-radius:var(--radius);font-size:1rem;font-weight:700;transition:background .2s;}
.login-card button:hover{background:var(--green-dark);}

/* ============ APP SHELL ============ */
#app{display:none;height:100vh;overflow:hidden;}
.app-layout{display:flex;height:100vh;}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:var(--dark);color:var(--white);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s;z-index:200;}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-header .brand{font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:8px;}
.sidebar-header .brand span{color:var(--green);}
.sidebar-header .subtitle{font-size:.7rem;color:var(--g400);margin-top:2px;text-transform:uppercase;letter-spacing:1px;}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto;}
.sidebar-nav .nav-section{font-size:.65rem;color:var(--g500);text-transform:uppercase;letter-spacing:1px;padding:12px 20px 6px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;font-size:.88rem;font-weight:500;color:var(--g400);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,.06);}
.nav-item.active{color:var(--white);background:rgba(106,187,30,.15);border-right:3px solid var(--green);}
.nav-item i{width:20px;text-align:center;font-size:.95rem;}
.nav-item .badge{margin-left:auto;background:var(--red);color:var(--white);padding:1px 7px;border-radius:10px;font-size:.7rem;font-weight:700;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:.75rem;color:var(--g500);}
.sidebar-footer button{background:none;border:1px solid rgba(255,255,255,.15);color:var(--g400);padding:8px 12px;border-radius:8px;font-size:.8rem;width:100%;transition:all .15s;}
.sidebar-footer button:hover{color:var(--white);border-color:rgba(255,255,255,.3);}

/* Main area */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.top-bar{background:var(--white);border-bottom:1px solid var(--g200);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.top-bar .page-title{font-size:1.15rem;font-weight:800;}
.top-bar .page-title .crumb{font-size:.8rem;color:var(--g500);font-weight:500;}
.top-bar-actions{display:flex;gap:8px;align-items:center;}
.menu-toggle{display:none;background:none;border:none;font-size:1.3rem;color:var(--g700);padding:4px 8px;}
.top-bar .sync{font-size:.75rem;color:var(--g400);}
.main-content{flex:1;overflow-y:auto;padding:24px;}

/* ============ SHARED COMPONENTS ============ */
.btn{padding:10px 18px;border:none;border-radius:var(--radius);font-size:.88rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btn-primary{background:var(--green);color:var(--white);}
.btn-primary:hover{background:var(--green-dark);}
.btn-outline{background:var(--white);color:var(--g700);border:1px solid var(--g300);}
.btn-outline:hover{background:var(--g50);border-color:var(--g400);}
.btn-danger{background:var(--red);color:var(--white);}
.btn-sm{padding:6px 12px;font-size:.8rem;}
.btn-icon{width:34px;height:34px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--g300);background:var(--white);color:var(--g600);}
.btn-icon:hover{background:var(--g50);}

.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;}
.card-header h3{font-size:.95rem;font-weight:700;}
.card-body{padding:20px;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);}
.stat-card .label{font-size:.7rem;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.stat-card .value{font-size:1.6rem;font-weight:800;margin-top:4px;line-height:1.2;}
.stat-card .change{font-size:.75rem;margin-top:4px;font-weight:600;}
.stat-card .change.up{color:var(--green);}
.stat-card .change.down{color:var(--red);}

/* Tables */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{background:var(--g50);padding:10px 14px;text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;font-weight:600;color:var(--g500);border-bottom:1px solid var(--g200);}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--g100);font-size:.88rem;vertical-align:middle;}
.data-table tr:hover{background:var(--g50);}
.data-table .mono{font-family:'SF Mono',Monaco,monospace;font-size:.8rem;color:var(--g500);}

/* Badges */
.badge-green{background:var(--green-light);color:#166534;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;display:inline-block;}
.badge-red{background:#fecaca;color:#991b1b;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;display:inline-block;}
.badge-yellow{background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;display:inline-block;}
.badge-blue{background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;display:inline-block;}
.badge-gray{background:var(--g200);color:var(--g700);padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;display:inline-block;}
.badge-purple{background:#ede9fe;color:#6d28d9;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;display:inline-block;}

/* Forms */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--g600);margin-bottom:4px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--g300);border-radius:8px;font-size:.9rem;transition:border .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(106,187,30,.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:1.05rem;font-weight:700;}
.modal-close{background:none;border:none;font-size:1.3rem;color:var(--g500);padding:4px;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--g200);display:flex;justify-content:flex-end;gap:8px;}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:20px;}
.search-bar input{flex:1;padding:10px 14px;border:1px solid var(--g300);border-radius:var(--radius);font-size:.9rem;background:var(--white);}
.search-bar input:focus{outline:none;border-color:var(--green);}

/* Filter pills */
.filter-pills{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.filter-pill{padding:6px 14px;border-radius:20px;font-size:.8rem;font-weight:600;border:1px solid var(--g300);background:var(--white);color:var(--g600);cursor:pointer;transition:all .15s;}
.filter-pill.active{background:var(--green);color:var(--white);border-color:var(--green);}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--g900);color:var(--white);padding:14px 20px;border-radius:var(--radius);font-size:.9rem;font-weight:500;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#166534;}
.toast.error{background:#991b1b;}

/* POS specific */
.pos-layout{display:grid;grid-template-columns:1fr 360px;gap:20px;height:calc(100vh - 130px);}
.pos-products{overflow-y:auto;padding-right:8px;}
.pos-cart{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;}
.pos-product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.pos-product-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:14px;cursor:pointer;transition:all .15s;border:2px solid transparent;}
.pos-product-card:hover{box-shadow:var(--shadow-md);border-color:var(--green);}
.pos-product-card .pname{font-size:.85rem;font-weight:600;margin-bottom:4px;line-height:1.3;}
.pos-product-card .pbrand{font-size:.72rem;color:var(--g500);}
.pos-product-card .pprice{font-size:1rem;font-weight:800;color:var(--green);margin-top:8px;}
.pos-product-card .pstock{font-size:.72rem;color:var(--g400);margin-top:2px;}
.cart-header{padding:16px 20px;border-bottom:1px solid var(--g200);font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.cart-items{flex:1;overflow-y:auto;padding:12px 16px;}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--g100);}
.cart-item .ci-info{flex:1;min-width:0;}
.cart-item .ci-name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-item .ci-price{font-size:.78rem;color:var(--g500);}
.cart-item .ci-qty{display:flex;align-items:center;gap:4px;}
.cart-item .ci-qty button{width:24px;height:24px;border-radius:6px;border:1px solid var(--g300);background:var(--white);font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.cart-item .ci-qty span{min-width:20px;text-align:center;font-weight:700;font-size:.9rem;}
.cart-item .ci-total{font-weight:700;font-size:.9rem;min-width:60px;text-align:right;}
.cart-item .ci-remove{color:var(--g400);background:none;border:none;font-size:.85rem;padding:4px;}
.cart-item .ci-remove:hover{color:var(--red);}
.cart-summary{padding:16px 20px;border-top:1px solid var(--g200);background:var(--g50);}
.cart-row{display:flex;justify-content:space-between;font-size:.88rem;padding:3px 0;}
.cart-row.total{font-size:1.1rem;font-weight:800;padding-top:8px;border-top:1px solid var(--g200);margin-top:6px;}
.cart-actions{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.cart-actions .btn{justify-content:center;width:100%;}

/* Empty states */
.empty-state{text-align:center;padding:60px 20px;color:var(--g400);}
.empty-state i{font-size:2.5rem;margin-bottom:12px;display:block;}
.empty-state p{font-size:.9rem;}

/* Chart container */
.chart-container{position:relative;height:280px;background:var(--white);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);}
.chart-bar-group{display:flex;align-items:flex-end;gap:4px;height:200px;padding:0 8px;}
.chart-bar{flex:1;background:var(--green);border-radius:4px 4px 0 0;min-width:20px;max-width:60px;transition:height .5s;position:relative;}
.chart-bar:hover{opacity:.85;}
.chart-labels{display:flex;gap:4px;padding:8px 8px 0;font-size:.65rem;color:var(--g500);text-align:center;}
.chart-labels span{flex:1;min-width:20px;max-width:60px;}

/* Receipt */
.receipt{max-width:360px;margin:0 auto;font-family:'Courier New',monospace;font-size:.85rem;line-height:1.5;padding:24px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);}
.receipt .r-header{text-align:center;border-bottom:1px dashed var(--g300);padding-bottom:12px;margin-bottom:12px;}
.receipt .r-line{display:flex;justify-content:space-between;}
.receipt .r-divider{border-bottom:1px dashed var(--g300);margin:8px 0;}
.receipt .r-total{font-weight:700;font-size:1rem;}

/* ============ RESPONSIVE ============ */
@media(max-width:1024px){
  .pos-layout{grid-template-columns:1fr;height:auto;}
  .pos-cart{max-height:50vh;}
}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);z-index:300;}
  .sidebar.open{transform:translateX(0);}
  .menu-toggle{display:block;}
  .stat-grid{grid-template-columns:1fr 1fr;}
  .form-row{grid-template-columns:1fr;}
  .main-content{padding:16px;}
  .pos-product-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .modal{max-width:95%;}
  #globalSearchWrap{display:none;}
  .page-title{font-size:1rem !important;}
  .top-bar{padding:10px 12px !important;}
  .stat-card .value{font-size:1.3rem;}
  .stat-card .label{font-size:.6rem;}
}
@keyframes spin{to{transform:rotate(360deg);}}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:250;}
.sidebar-overlay.show{display:block;}

/* ============ PRINT ============ */
@media print{
  body{background:#fff!important;overflow:visible!important;}
  #app,.sidebar,.sidebar-overlay,.top-bar,.main-area{display:none!important;}
  .modal-overlay{position:static!important;background:none!important;display:block!important;padding:0!important;}
  .modal-overlay.show{display:block!important;}
  .modal{max-width:100%!important;box-shadow:none!important;border:none!important;}
  .modal-footer{display:none!important;}
  .modal-header .modal-close{display:none!important;}
  .receipt{max-width:380px;margin:0 auto;font-size:12pt;}
  .receipt .r-header{text-align:center;margin-bottom:12px;font-size:11pt;}
  .receipt .r-line{display:flex;justify-content:space-between;padding:3px 0;font-size:10pt;}
  .receipt .r-total{font-size:14pt;font-weight:800;border-top:2px solid #000;padding-top:6px;margin-top:6px;}
  .receipt .r-divider{border-top:1px dashed #999;margin:8px 0;}
  .data-table{font-size:9pt;}
  .data-table th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .badge-green,.badge-red,.badge-yellow,.badge-blue,.badge-gray,.badge-purple{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">🌿</div>
    <h1>Smart Lawn NY</h1>
    <p class="sub">Point of Sale & Inventory</p>
    <input type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">🌿 <span>Smart Lawn</span> NY</div>
        <div class="subtitle">Point of Sale</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <button class="nav-item active" onclick="go('dashboard',this)"><i class="fas fa-chart-line"></i>Dashboard</button>
        <button class="nav-item" onclick="go('pos',this)"><i class="fas fa-cash-register"></i>POS / Sell</button>
        <div class="nav-section">Manage</div>
        <button class="nav-item" onclick="go('products',this)"><i class="fas fa-box"></i>Products</button>
        <button class="nav-item" onclick="go('customers',this)"><i class="fas fa-users"></i>Customers</button>
        <button class="nav-item" onclick="go('orders',this)"><i class="fas fa-truck"></i>Orders</button>
        <button class="nav-item" onclick="go('invoices',this)"><i class="fas fa-file-invoice-dollar"></i>Invoices</button>
        <button class="nav-item" onclick="go('purchasing',this)"><i class="fas fa-dolly"></i>Purchasing</button>
        <button class="nav-item" onclick="go('service',this)"><i class="fas fa-wrench"></i>Service</button>
        <button class="nav-item" onclick="go('subscriptions',this)"><i class="fas fa-sync-alt"></i>MaaS</button>
        <div class="nav-section">Insights</div>
        <button class="nav-item" onclick="go('reports',this)"><i class="fas fa-chart-bar"></i>Reports</button>
        <button class="nav-item" onclick="go('history',this)"><i class="fas fa-receipt"></i>Sales History</button>
        <button class="nav-item" onclick="go('activity',this)"><i class="fas fa-clipboard-list"></i>Activity Log</button>
        <div class="nav-section">System</div>
        <button class="nav-item" onclick="go('settings',this)"><i class="fas fa-cog"></i>Settings</button>
      </nav>
      <div class="sidebar-footer">
        <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Main -->
    <div class="main-area">
      <div class="top-bar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <div class="page-title" id="pageTitle">Dashboard</div>
        </div>
        <div class="top-bar-actions" style="display:flex;align-items:center;gap:8px;">
          <div style="position:relative;" id="globalSearchWrap">
            <input type="text" id="globalSearch" placeholder="Search everything... (⌘K)" oninput="doGlobalSearch()" onfocus="document.getElementById('globalResults').style.display='block'" style="padding:8px 12px 8px 32px;border:1px solid var(--g300);border-radius:var(--radius);font-size:.85rem;width:220px;background:var(--white);">
            <i class="fas fa-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:.8rem;"></i>
            <div id="globalResults" style="display:none;position:absolute;top:100%;right:0;width:360px;max-height:400px;overflow-y:auto;background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:400;margin-top:4px;"></div>
          </div>
          <button class="btn-icon" onclick="showHelp()" title="Help" style="color:var(--blue);"><i class="fas fa-question-circle"></i></button>
          <span class="sync" id="lastSync"></span>
          <button class="btn-icon" onclick="refreshData()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
        </div>
      </div>
      <div class="main-content" id="mainContent">
        <!-- Pages rendered here by JS -->
      </div>
    </div>
  </div>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Modal</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

  // Cost and margin from products
  var totalCostVal=0;
  products.forEach(function(p){totalCostVal+=(p.quantity||0)*(p.cost||0);});
  var avgMargin=invValue>0?((invValue-totalCostVal)/invValue):0;

  // 7-day revenue chart

function initPOS(){
  // Populate customer dropdown
  var sel=document.getElementById('posCustomer');
  if(sel){
    customers.forEach(function(c){
      var o=document.createElement('option');
      o.value=c.id;o.textContent=c.name+(c.phone?' ('+c.phone+')':'');
      sel.appendChild(o);
    });
  }
  renderCart();
}

function quickAddCustomer(){
  var html='<div class="form-row"><div class="form-group"><label>Name *</label><input id="qcName" placeholder="John Smith"></div><div class="form-group"><label>Phone</label><input type="tel" id="qcPhone" placeholder="(914) 555-1234"></div></div>';
  html+='<div class="form-row"><div class="form-group"><label>Email</label><input type="email" id="qcEmail" placeholder="john@example.com"></div><div class="form-group"><label>City</label><input id="qcCity" value="Peekskill"></div></div>';

function saveQuickCustomer(){
  var name=$('qcName').value.trim();
  if(!name){toast('Name is required','error');return;}
  var data={name:name,phone:$('qcPhone').value.trim()||null,email:$('qcEmail').value.trim()||null,city:$('qcCity').value.trim()||null,state:'NY'};
  sb('customers',{method:'POST',body:JSON.stringify(data)}).then(function(result){
    closeModal();
    toast('Customer added');
    // Reload customers and select the new one
    return sb('customers?select=*&order=name');
  }).then(function(d){
    customers=d||[];
    var sel=document.getElementById('posCustomer');
    if(sel){
      // Rebuild options
      sel.innerHTML='<option value="">Walk-in</option>';
      customers.forEach(function(c){
        var o=document.createElement('option');
        o.value=c.id;o.textContent=c.name+(c.phone?' ('+c.phone+')':'');
        sel.appendChild(o);
      });
      // Select the new customer (last created, match by name)
      var newC=customers.find(function(c){return c.name===name;});
      if(newC) sel.value=newC.id;
    }
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

var posActiveCat='';
function filterPosProducts(){
  var q=(document.getElementById('posSearch').value||'').toLowerCase();
  var cards=document.querySelectorAll('.pos-product-card');
  cards.forEach(function(c){
    var text=c.textContent.toLowerCase();
    var sku=(c.getAttribute('data-sku')||'').toLowerCase();
    var cat=c.getAttribute('data-cat')||'';
    var matchText=!q||text.includes(q)||sku.includes(q);
    var matchCat=!posActiveCat||cat===posActiveCat;
    c.style.display=(matchText&&matchCat)?'':'none';
  });
}

function filterPosCat(catId){
  posActiveCat=catId;
  var tabs=document.querySelectorAll('#posCatTabs button');
  tabs.forEach(function(t){
    t.className=(t.getAttribute('data-cat')===catId)?'badge-green':'badge-gray';
    t.style.cssText='cursor:pointer;padding:6px 14px;font-size:.8rem;';
  });
  filterPosProducts();
}

function addToCart(pid){
  var p=products.find(function(x){return x.id===pid;});
  if(!p)return;
  var existing=cart.find(function(c){return c.product_id===pid;});
  if(existing){
    if(existing.qty>=p.quantity){toast('Max stock reached','error');return;}
    existing.qty++;
  } else {
    cart.push({product_id:pid,name:p.name,price:p.price,qty:1,max:p.quantity});
  }
  renderCart();
}

function updateCartQty(pid,delta){
  var item=cart.find(function(c){return c.product_id===pid;});
  if(!item)return;
  var p=products.find(function(x){return x.id===pid;});
  item.qty+=delta;
  if(item.qty<=0) cart=cart.filter(function(c){return c.product_id!==pid;});
  else if(p&&item.qty>p.quantity){item.qty=p.quantity;toast('Max stock reached','error');}
  renderCart();
}

function removeFromCart(pid){
  cart=cart.filter(function(c){return c.product_id!==pid;});
  renderCart();
}

function clearCart(){cart=[];renderCart();}

function renderCart(){
  var items=document.getElementById('cartItems');
  var summary=document.getElementById('cartSummary');
  var actions=document.getElementById('cartActions');
  var clearBtn=document.getElementById('clearCartBtn');
  if(!items)return;

  if(cart.length===0){
    items.innerHTML='<div class="empty-state"><i class="fas fa-shopping-basket"></i><p>Tap products to add</p></div>';
    if(summary)summary.style.display='none';
    if(actions)actions.style.display='none';
    if(clearBtn)clearBtn.style.display='none';
    return;
  }

  var html='';
  cart.forEach(function(c){
    html+='<div class="cart-item">';
    html+='<div class="ci-info"><div class="ci-name">'+escHtml(c.name)+'</div><div class="ci-price">'+money(c.price)+' ea</div></div>';
    html+='<div class="ci-qty"><button onclick="updateCartQty(\''+c.product_id+'\',-1)">−</button><span>'+c.qty+'</span><button onclick="updateCartQty(\''+c.product_id+'\',1)">+</button></div>';
    html+='<div class="ci-total">'+money(c.price*c.qty)+'</div>';
    html+='<button class="ci-remove" onclick="removeFromCart(\''+c.product_id+'\')"><i class="fas fa-times"></i></button>';
    html+='</div>';
  });
  items.innerHTML=html;
  if(summary)summary.style.display='block';
  if(actions)actions.style.display='flex';
  if(clearBtn)clearBtn.style.display='';
  updateCartTotals();
}

function updateCartTotals(){
  var subtotal=0;
  cart.forEach(function(c){subtotal+=c.price*c.qty;});
  var discount=parseFloat((document.getElementById('posDiscount')||{}).value)||0;
  var taxable=Math.max(0,subtotal-discount);
  var tax=Math.round(taxable*TAX_RATE*100)/100;
  var total=taxable+tax;
  var el=function(id){return document.getElementById(id);};
  if(el('cartSubtotal'))el('cartSubtotal').textContent=money(subtotal);
  if(el('cartTax'))el('cartTax').textContent=money(tax);
  if(el('cartDiscount'))el('cartDiscount').textContent=discount>0?'-'+money(discount):'$0.00';
  if(el('cartTotal'))el('cartTotal').textContent=money(total);
}

function completeSale(){
  if(cart.length===0){toast('Cart is empty','error');return;}

  // Check if any cart items have serial numbers that need assigning
  var needsSerial=[];
  cart.forEach(function(item){
    var avail=serialNumbers.filter(function(s){return s.product_id===item.product_id&&s.status==='in_stock';});
    if(avail.length>0) needsSerial.push({item:item,serials:avail});
  });

  if(needsSerial.length>0&&!cart._serialsAssigned){
    // Show serial number picker
    var html='<p style="margin-bottom:16px;color:var(--g500);font-size:.85rem;">Select which unit(s) you\'re selling:</p>';
    needsSerial.forEach(function(ns){
      html+='<div style="margin-bottom:16px;"><div style="font-weight:700;margin-bottom:8px;">'+escHtml(ns.item.name)+' (×'+ns.item.qty+')</div>';
      ns.serials.forEach(function(sn,i){
        var checked=i<ns.item.qty?' checked':'';
        html+='<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--g50);border-radius:8px;margin-bottom:4px;cursor:pointer;font-size:.88rem;">';
        html+='<input type="checkbox" class="sn-pick" data-product="'+ns.item.product_id+'" data-sn-id="'+sn.id+'" value="'+escHtml(sn.serial_number)+'"'+checked+'>';
        html+='<span class="mono" style="font-weight:600;">'+escHtml(sn.serial_number)+'</span>';
        html+='</label>';
      });
      html+='</div>';
    });
    var footer='<button class="btn btn-outline" onclick="closeModal()">Cancel</button> <button class="btn btn-primary" onclick="confirmSerialSale()"><i class="fas fa-check-circle"></i> Confirm & Complete Sale</button>';
    openModal('Assign Serial Numbers',html,footer);
    return;
  }

  finalizeSale();
}

function confirmSerialSale(){
  // Collect selected serial numbers
  cart._serialsAssigned=true;
  cart._selectedSerials=[];
  document.querySelectorAll('.sn-pick:checked').forEach(function(cb){
    cart._selectedSerials.push({product_id:cb.getAttribute('data-product'),sn_id:cb.getAttribute('data-sn-id'),serial:cb.value});
  });
  closeModal();
  finalizeSale();
}

function finalizeSale(){
  var subtotal=0;
  cart.forEach(function(c){subtotal+=c.price*c.qty;});
  var discount=parseFloat((document.getElementById('posDiscount')||{}).value)||0;
  var taxable=Math.max(0,subtotal-discount);
  var tax=Math.round(taxable*TAX_RATE*100)/100;
  var total=taxable+tax;
  var custId=document.getElementById('posCustomer').value||null;
  var custName='Walk-in';
  if(custId){var c=customers.find(function(x){return x.id===custId;});if(c)custName=c.name;}
  var payment=document.getElementById('posPayment').value;

  // Record the sale
  var saleData={
    subtotal:subtotal,tax:tax,discount:discount,total:total,
    customer_id:custId,customer_name:custName,
    payment_method:payment,sale_type:'in-store',status:'completed',
    quantity:cart.reduce(function(a,c){return a+c.qty;},0),
    unit_price:cart.length===1?cart[0].price:0,
    product_id:cart.length===1?cart[0].product_id:null
  };

  sb('sales',{method:'POST',body:JSON.stringify(saleData)}).then(function(result){
    var saleId=result&&result[0]?result[0].id:null;
    // Insert sale items & decrease inventory
    var promises=[];
    cart.forEach(function(item){
      promises.push(sb('sale_items',{method:'POST',body:JSON.stringify({
        sale_id:saleId,product_id:item.product_id,product_name:item.name,
        quantity:item.qty,unit_price:item.price,total:item.price*item.qty
      })}));
      // Decrease stock
      var p=products.find(function(x){return x.id===item.product_id;});
      if(p){
        var newQty=Math.max(0,p.quantity-item.qty);
        promises.push(sb('products?id=eq.'+item.product_id,{method:'PATCH',body:JSON.stringify({quantity:newQty,updated_at:new Date().toISOString()})}));
        promises.push(sb('inventory_log',{method:'POST',body:JSON.stringify({product_id:item.product_id,change:-item.qty,reason:'Sale '+((result&&result[0])?result[0].receipt_number:'')})}));
      }
    });
    // Mark serial numbers as sold + set warranty
    if(cart._selectedSerials&&cart._selectedSerials.length>0){
      var warrantyStart=new Date().toISOString().slice(0,10);
      var warrantyEnd=new Date(Date.now()+730*86400000).toISOString().slice(0,10); // 2 years
      cart._selectedSerials.forEach(function(sn){
        promises.push(sb('serial_numbers?id=eq.'+sn.sn_id,{method:'PATCH',body:JSON.stringify({
          status:'sold',sale_id:saleId,customer_id:custId,sold_at:new Date().toISOString(),
          warranty_start:warrantyStart,warranty_end:warrantyEnd,warranty_type:'2-year manufacturer'
        })}));
      });
    }
    return Promise.all(promises).then(function(){return result;});
  }).then(function(result){
    var receipt=result&&result[0]?result[0]:{};
    // Include serial numbers on receipt
    var receiptSerials=cart._selectedSerials||[];
    showReceipt(receipt,cart,subtotal,tax,discount,total,custName,payment,receiptSerials);
    cart=[];cart._serialsAssigned=false;cart._selectedSerials=[];
    loadAll();
  }).catch(function(e){toast('Sale failed: '+e.message,'error');console.error(e);});
}

function showReceipt(sale,items,subtotal,tax,discount,total,custName,payment,receiptSerials){
  receiptSerials=receiptSerials||[];
  var html='<div class="receipt">';
  html+='<div class="r-header"><strong>'+escHtml(settings.bizName)+'</strong><br>'+escHtml(settings.bizPhone)+'<br>'+fmtDateTime(new Date())+'<br>'+(sale.receipt_number||'')+'</div>';
  items.forEach(function(item){
    html+='<div class="r-line"><span>'+escHtml(item.name)+' x'+item.qty+'</span><span>'+money(item.price*item.qty)+'</span></div>';
    // Show serial numbers for this item
    var itemSerials=receiptSerials.filter(function(s){return s.product_id===item.product_id;});
    if(itemSerials.length>0){
      itemSerials.forEach(function(sn){
        html+='<div style="font-size:.75rem;color:var(--g500);padding-left:12px;">SN: '+escHtml(sn.serial)+'</div>';
      });
    }
  });
  html+='<div class="r-divider"></div>';
  html+='<div class="r-line"><span>Subtotal</span><span>'+money(subtotal)+'</span></div>';
  if(discount>0) html+='<div class="r-line"><span>Discount</span><span>-'+money(discount)+'</span></div>';
  html+='<div class="r-line"><span>Tax</span><span>'+money(tax)+'</span></div>';
  html+='<div class="r-divider"></div>';
  html+='<div class="r-line r-total"><span>TOTAL</span><span>'+money(total)+'</span></div>';
  html+='<div class="r-divider"></div>';
  html+='<div class="r-line"><span>Payment</span><span>'+escHtml(payment)+'</span></div>';
  html+='<div class="r-line"><span>Customer</span><span>'+escHtml(custName)+'</span></div>';
  html+='<div style="text-align:center;margin-top:16px;font-size:.8rem;color:var(--g500);">'+escHtml(settings.receiptFooter)+'</div>';
  html+='</div>';
  openModal('Sale Complete',html,'<button class="btn btn-outline" onclick="closeModal()">Close</button> <button class="btn btn-primary" onclick="window.print();closeModal()"><i class="fas fa-print"></i> Print</button>');
  toast('Sale recorded — '+money(total));
}

function renderProducts(){
  var html='<div class="search-bar"><input type="text" id="productSearch" placeholder="Search products..." oninput="filterProducts()"><div style="display:flex;gap:8px;"><button class="btn btn-outline" onclick="printAllLabels()"><i class="fas fa-barcode"></i> Labels</button><button class="btn btn-outline" onclick="exportProductsCSV()"><i class="fas fa-download"></i> CSV</button><button class="btn btn-primary" onclick="openProductModal()"><i class="fas fa-plus"></i> Add Product</button></div></div>';

  html+='<div class="card"><div style="overflow-x:auto;"><table class="data-table" id="productsTable"><thead><tr><th>Product</th><th>SKU</th><th>Price</th><th>Cost</th><th>Margin</th><th>Stock</th><th>Status</th><th></th></tr></thead><tbody>';
  if(products.length===0) html+='<tr><td colspan="8" class="empty-state">No products yet</td></tr>';
  else products.forEach(function(p){
    var margin=p.price>0?((p.price-(p.cost||0))/p.price):0;
    var stockSt=p.quantity<=0?'out':p.quantity<=(p.low_stock_threshold||5)?'low':'completed';
    html+='<tr onclick="viewProduct(\''+p.id+'\')" style="cursor:pointer;">';
    html+='<td><strong>'+escHtml(p.name)+'</strong><br><span style="font-size:.75rem;color:var(--g500);">'+escHtml(p.brand||'')+'</span></td>';
    html+='<td class="mono">'+escHtml(p.sku||'')+'</td>';
    html+='<td>'+money(p.price)+'</td>';
    html+='<td>'+money(p.cost)+'</td>';
    html+='<td><strong style="color:'+(margin>=.3?'var(--green)':margin>=.15?'var(--orange)':'var(--red)')+';">'+pct(margin)+'</strong></td>';
    html+='<td>'+statusBadge(stockSt)+' <strong>'+p.quantity+'</strong></td>';

function saveProduct(id){
  var data={
    name:$('pName').value.trim(),
    brand:$('pBrand').value.trim(),
    sku:$('pSku').value.trim(),
    category_id:$('pCat').value||null,
    price:parseFloat($('pPrice').value)||0,
    cost:parseFloat($('pCost').value)||0,
    quantity:parseInt($('pQty').value)||0,
    low_stock_threshold:parseInt($('pThresh').value)||5,
    description:$('pDesc').value.trim(),
    image_url:$('pImg').value.trim()||null,
    status:$('pStatus').value,
    updated_at:new Date().toISOString()
  };
  if(!data.name){toast('Name is required','error');return;}
  if(!data.price){toast('Price is required','error');return;}

  var url=id?'products?id=eq.'+id:'products';
  var method=id?'PATCH':'POST';
  sb(url,{method:method,body:JSON.stringify(data)}).then(function(){
    closeModal();toast(id?'Product updated':'Product created');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

}

function openStockModal(id){
  var p=products.find(function(x){return x.id===id;});
  if(!p)return;
  var html='<p style="margin-bottom:16px;"><strong>'+escHtml(p.name)+'</strong> — Current stock: <strong>'+p.quantity+'</strong></p>';
  html+='<div class="form-row"><div class="form-group"><label>New Quantity</label><input type="number" id="stockQty" value="'+p.quantity+'" min="0"></div><div class="form-group"><label>Reason</label><input id="stockReason" placeholder="Restock, adjustment, etc." value="Manual adjustment"></div></div>';
  var footer='<button class="btn btn-outline" onclick="closeModal()">Cancel</button> <button class="btn btn-primary" onclick="saveStock(\''+id+'\')"><i class="fas fa-check"></i> Update Stock</button>';
  openModal('Adjust Stock',html,footer);
}

function saveStock(id){
  var newQty=parseInt($('stockQty').value)||0;
  var reason=$('stockReason').value||'Manual adjustment';
  var p=products.find(function(x){return x.id===id;});
  var delta=newQty-(p?p.quantity:0);
  sb('products?id=eq.'+id,{method:'PATCH',body:JSON.stringify({quantity:newQty,updated_at:new Date().toISOString()})}).then(function(){
    return sb('inventory_log',{method:'POST',body:JSON.stringify({product_id:id,change:delta,reason:reason})});
  }).then(function(){
    closeModal();toast('Stock updated');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

function viewCustomer(id){
  var c=customers.find(function(x){return x.id===id;});
  if(!c)return;
  var custSales=sales.filter(function(s){return s.customer_id===id;});
  var custOrders=orders.filter(function(o){return o.customer_id===id;});
  var custInvoices=invoices.filter(function(i){return i.customer_id===id;});

  // Customer metrics
  var avgOrder=custSales.length>0?(Number(c.total_spent)||0)/custSales.length:0;
  var firstPurchase=custSales.length>0?custSales[custSales.length-1].created_at:null;
  var daysSinceFirst=firstPurchase?Math.floor((Date.now()-new Date(firstPurchase))/(86400000)):0;
  var custSubs=subscriptions.filter(function(s){return s.customer_id===id&&s.status==='active';});
  var mrrValue=0;custSubs.forEach(function(s){mrrValue+=Number(s.monthly_rate)||0;});
  var ltv=(Number(c.total_spent)||0)+(mrrValue*6*5); // current spend + projected 5yr MaaS

  var html='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">';
  html+='<div class="stat-card"><div class="label">Lifetime Value</div><div class="value" style="color:var(--green);font-size:1.2rem;">'+money(ltv)+'</div></div>';
  html+='<div class="stat-card"><div class="label">Total Spent</div><div class="value" style="font-size:1.2rem;">'+money(c.total_spent)+'</div></div>';
  html+='<div class="stat-card"><div class="label">Avg Order</div><div class="value" style="font-size:1.2rem;">'+money(avgOrder)+'</div></div>';
  html+='<div class="stat-card"><div class="label">Purchases</div><div class="value" style="font-size:1.2rem;">'+(c.total_orders||0)+'</div></div>';
  html+='</div>';
  if(custSubs.length>0){
    html+='<div style="margin-bottom:16px;padding:12px 16px;background:var(--blue-light);border-radius:10px;border:1px solid #93c5fd;"><i class="fas fa-sync-alt" style="color:var(--blue);margin-right:6px;"></i><strong style="color:var(--blue);">Active MaaS:</strong> '+custSubs.length+' subscription'+(custSubs.length>1?'s':'')+' — <strong>'+money(mrrValue)+'/mo</strong></div>';
  }
  if(firstPurchase){
    html+='<div style="margin-bottom:16px;font-size:.82rem;color:var(--g500);"><i class="fas fa-calendar" style="margin-right:4px;"></i>Customer since '+fmtDate(firstPurchase)+' ('+daysSinceFirst+' days)</div>';
  }

  // Contact info
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:.88rem;">';
  if(c.email) html+='<div><i class="fas fa-envelope" style="color:var(--g400);width:20px;"></i> '+escHtml(c.email)+'</div>';
  if(c.phone) html+='<div><i class="fas fa-phone" style="color:var(--g400);width:20px;"></i> '+escHtml(c.phone)+'</div>';
  if(c.address||c.city) html+='<div><i class="fas fa-map-marker-alt" style="color:var(--g400);width:20px;"></i> '+escHtml([c.address,c.city,c.state,c.zip].filter(Boolean).join(', '))+'</div>';
  if(c.tags&&c.tags.length) html+='<div><i class="fas fa-tags" style="color:var(--g400);width:20px;"></i> '+c.tags.map(function(t){return '<span class="badge-blue">'+escHtml(t)+'</span>';}).join(' ')+'</div>';
  html+='</div>';
  if(c.notes) html+='<div style="font-size:.85rem;color:var(--g500);margin-bottom:16px;padding:10px;background:var(--g50);border-radius:8px;"><i class="fas fa-sticky-note" style="margin-right:6px;"></i>'+escHtml(c.notes)+'</div>';

  // Purchase history
  html+='<div style="margin-bottom:8px;font-weight:700;font-size:.9rem;">Purchase History ('+custSales.length+')</div>';
  if(custSales.length>0){
    html+='<table class="data-table" style="margin-bottom:16px;"><thead><tr><th>Date</th><th>Receipt</th><th>Total</th><th>Payment</th><th>Status</th></tr></thead><tbody>';
    custSales.forEach(function(s){
      html+='<tr><td>'+fmtDate(s.created_at)+'</td><td class="mono">'+(s.receipt_number||'—')+'</td><td><strong>'+money(s.total)+'</strong></td><td>'+escHtml(s.payment_method||'—')+'</td><td>'+statusBadge(s.status||'completed')+'</td></tr>';
    });
    html+='</tbody></table>';
  } else html+='<div style="color:var(--g400);font-size:.85rem;margin-bottom:16px;">No purchases yet</div>';

  // Orders
  if(custOrders.length>0){
    html+='<div style="margin-bottom:8px;font-weight:700;font-size:.9rem;">Orders ('+custOrders.length+')</div>';
    html+='<table class="data-table" style="margin-bottom:16px;"><thead><tr><th>Order #</th><th>Date</th><th>Total</th><th>Status</th></tr></thead><tbody>';
    custOrders.forEach(function(o){
      html+='<tr><td class="mono">'+escHtml(o.order_number||'—')+'</td><td>'+fmtDate(o.created_at)+'</td><td><strong>'+money(o.total)+'</strong></td><td>'+statusBadge(o.status)+'</td></tr>';
    });
    html+='</tbody></table>';
  }

  // Invoices
  if(custInvoices.length>0){
    html+='<div style="margin-bottom:8px;font-weight:700;font-size:.9rem;">Invoices ('+custInvoices.length+')</div>';
    html+='<table class="data-table"><thead><tr><th>Invoice #</th><th>Date</th><th>Total</th><th>Status</th></tr></thead><tbody>';
    custInvoices.forEach(function(i){
      html+='<tr><td class="mono">'+escHtml(i.invoice_number||'—')+'</td><td>'+fmtDate(i.created_at)+'</td><td><strong>'+money(i.total)+'</strong></td><td>'+statusBadge(i.status)+'</td></tr>';
    });
    html+='</tbody></table>';
  }

  // Service tickets
  var custTickets=serviceTickets.filter(function(t){return t.customer_id===id;});
  if(custTickets.length>0){
    html+='<div style="margin-bottom:8px;font-weight:700;font-size:.9rem;"><i class="fas fa-wrench" style="color:var(--orange);margin-right:4px;"></i>Service Tickets ('+custTickets.length+')</div>';
    html+='<table class="data-table" style="margin-bottom:16px;"><thead><tr><th>Ticket</th><th>Date</th><th>Type</th><th>Status</th><th>Cost</th></tr></thead><tbody>';
    custTickets.forEach(function(t){
      html+='<tr><td class="mono">'+escHtml(t.ticket_number||'—')+'</td><td>'+fmtDate(t.created_at)+'</td><td>'+statusBadge(t.type)+'</td><td>'+statusBadge(t.status)+'</td><td>'+money(t.total_cost)+'</td></tr>';
    });
    html+='</tbody></table>';
  }

  // Subscriptions
  if(custSubs.length>0){
    html+='<div style="margin-bottom:8px;font-weight:700;font-size:.9rem;"><i class="fas fa-sync-alt" style="color:var(--blue);margin-right:4px;"></i>MaaS Subscriptions ('+custSubs.length+')</div>';
    html+='<table class="data-table"><thead><tr><th>Plan</th><th>Monthly</th><th>Property</th><th>Status</th></tr></thead><tbody>';
    custSubs.forEach(function(s){
      html+='<tr><td>'+escHtml(s.plan_name||'—')+'</td><td style="color:var(--green);font-weight:700;">'+money(s.monthly_rate)+'</td><td>'+escHtml(s.property_address||'—')+'</td><td>'+statusBadge(s.status)+'</td></tr>';
    });
    html+='</tbody></table>';
  }

  var footer='<button class="btn btn-outline" onclick="closeModal()">Close</button> <button class="btn btn-outline" onclick="closeModal();openTicketModal();setTimeout(function(){$(\'tCust\').value=\''+id+'\';autoFillSubCust();},100)"><i class="fas fa-wrench"></i> New Ticket</button> <button class="btn btn-primary" onclick="closeModal();openCustomerModal(\''+id+'\')"><i class="fas fa-pen"></i> Edit</button>';
  openModal(escHtml(c.name),html,footer);
}

function calcOrderTotal(){
  var sub=parseFloat(($('oSubtotal')||{}).value)||0;
  var tax=parseFloat(($('oTax')||{}).value)||0;
  var ship=parseFloat(($('oShip')||{}).value)||0;
  var disc=parseFloat(($('oDisc')||{}).value)||0;
  if($('oTotal'))$('oTotal').value=(sub+tax+ship-disc).toFixed(2);
}

function saveOrder(id){
  var data={
    customer_id:$('oCustomer').value||null,
    customer_name:$('oCustName').value.trim(),
    customer_email:$('oCustEmail').value.trim()||null,
    customer_phone:$('oCustPhone').value.trim()||null,
    shipping_address:$('oAddr').value.trim()||null,

function deleteOrder(id){
  if(!confirm('Delete this order?'))return;
  sb('orders?id=eq.'+id,{method:'DELETE'}).then(function(){
    closeModal();toast('Order deleted');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

function orderToInvoice(id){
  var o=orders.find(function(x){return x.id===id;});
  if(!o)return;
  if(!confirm('Create invoice from '+escHtml(o.order_number||'this order')+'?'))return;
  var dueDate=new Date();dueDate.setDate(dueDate.getDate()+30);
  var invData={
    customer_id:o.customer_id,customer_name:o.customer_name||'',customer_email:o.customer_email||'',
    customer_address:o.shipping_address||'',
    subtotal:o.subtotal||0,tax:o.tax||0,discount:o.discount||0,total:o.total||0,
    status:'sent',due_date:dueDate.toISOString().slice(0,10),
    payment_method:o.payment_method||'',notes:'Created from '+o.order_number
  };
  sb('invoices',{method:'POST',body:JSON.stringify(invData)}).then(function(result){
    toast('Invoice created from '+o.order_number);
    // Also get order items and copy to invoice items
    return sb('order_items?order_id=eq.'+id+'&select=*').then(function(items){
      if(!items||!items.length)return;
      var invId=result&&result[0]?result[0].id:null;
      if(!invId)return;
      var promises=[];
      items.forEach(function(item){
        promises.push(sb('invoice_items',{method:'POST',body:JSON.stringify({
          invoice_id:invId,product_id:item.product_id,description:item.product_name||'',
          quantity:item.quantity,unit_price:item.unit_price,total:item.total
        })}));
      });
      return Promise.all(promises);
    });
  }).then(function(){loadAll();go('invoices');}).catch(function(e){toast('Error: '+e.message,'error');});
}

function renderReports(){
  // Monthly revenue
  var monthlyRev={};
  var monthlyCost={};
  sales.forEach(function(s){
    if(s.status==='voided'||s.status==='refunded')return;
    var m=(s.created_at||'').slice(0,7);
    if(!m)return;
    monthlyRev[m]=(monthlyRev[m]||0)+Number(s.total||0);
  });

  // Top products
  var prodSales={};
  sales.forEach(function(s){
    if(s.status==='voided'||s.status==='refunded')return;
    var name=s.products?s.products.name:'Unknown';
    if(!prodSales[name])prodSales[name]={name:name,qty:0,rev:0};
    prodSales[name].qty+=s.quantity||1;
    prodSales[name].rev+=Number(s.total)||0;
  });
  var topProducts=Object.values(prodSales).sort(function(a,b){return b.rev-a.rev;}).slice(0,10);

  // Payment methods
  var payMethods={};
  sales.forEach(function(s){
    if(s.status==='voided'||s.status==='refunded')return;
    var pm=s.payment_method||'Unknown';
    payMethods[pm]=(payMethods[pm]||0)+Number(s.total||0);
  });

  // Product margins
  var marginData=products.map(function(p){
    var margin=p.price>0?((p.price-(p.cost||0))/p.price):0;
    return{name:p.name,price:p.price,cost:p.cost||0,margin:margin,profit:p.price-(p.cost||0)};
  }).sort(function(a,b){return b.margin-a.margin;});

  var html='<div class="stat-grid" style="margin-bottom:24px;">';
  // All-time totals
  var totalRev=0,totalTx=0;
  sales.forEach(function(s){if(s.status!=='voided'&&s.status!=='refunded'){totalRev+=Number(s.total)||0;totalTx++;}});
  var avgTicket=totalTx>0?totalRev/totalTx:0;
  // P&L calculation
  var totalCOGS=0;
  purchaseOrders.forEach(function(po){if(po.status==='received')totalCOGS+=Number(po.total)||0;});
  var serviceRev=0,serviceCost=0;
  serviceTickets.forEach(function(t){if(t.status==='completed'){if(!t.is_warranty)serviceRev+=Number(t.total_cost)||0;serviceCost+=Number(t.parts_cost)||0;}});
  var grossProfit=totalRev-totalCOGS;
  var grossMargin=totalRev>0?grossProfit/totalRev:0;
  var netProfit=grossProfit+serviceRev-serviceCost;

  html+='<div class="stat-card" style="margin-bottom:20px;background:linear-gradient(135deg,#f0f8e8,#e8f5d8);border:2px solid var(--green);"><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;text-align:center;">';
  html+='<div><div style="font-size:.72rem;font-weight:600;color:var(--g500);text-transform:uppercase;">Revenue</div><div style="font-size:1.4rem;font-weight:800;color:var(--green);">'+money(totalRev)+'</div></div>';
  html+='<div><div style="font-size:.72rem;font-weight:600;color:var(--g500);text-transform:uppercase;">COGS</div><div style="font-size:1.4rem;font-weight:800;color:var(--red);">'+money(totalCOGS)+'</div></div>';
  html+='<div><div style="font-size:.72rem;font-weight:600;color:var(--g500);text-transform:uppercase;">Gross Profit</div><div style="font-size:1.4rem;font-weight:800;color:'+(grossProfit>=0?'var(--green)':'var(--red)')+';">'+money(grossProfit)+'</div></div>';
  html+='<div><div style="font-size:.72rem;font-weight:600;color:var(--g500);text-transform:uppercase;">Gross Margin</div><div style="font-size:1.4rem;font-weight:800;color:'+(grossMargin>=.3?'var(--green)':'var(--orange)')+';">'+pct(grossMargin)+'</div></div>';
  html+='<div><div style="font-size:.72rem;font-weight:600;color:var(--g500);text-transform:uppercase;">Service Rev</div><div style="font-size:1.4rem;font-weight:800;color:var(--blue);">'+money(serviceRev)+'</div></div>';
  html+='</div></div>';

  html+='<div class="stat-card"><div class="label">Total Revenue</div><div class="value" style="color:var(--green);">'+money(totalRev)+'</div></div>';
  html+='<div class="stat-card"><div class="label">Avg Ticket</div><div class="value">'+money(avgTicket)+'</div></div>';
  html+='<div class="stat-card"><div class="label">Total Transactions</div><div class="value">'+totalTx+'</div></div>';
  html+='<div class="stat-card"><div class="label">Customers</div><div class="value">'+customers.length+'</div></div>';
  html+='</div>';

  // Monthly revenue chart
  var months=Object.keys(monthlyRev).sort();
  html+='<div class="card" style="margin-bottom:20px;"><div class="card-header"><h3>Monthly Revenue</h3></div><div class="card-body">';
  if(months.length===0) html+='<div class="empty-state"><p>No sales data yet</p></div>';
  else{
    var maxRev=Math.max.apply(null,months.map(function(m){return monthlyRev[m];}));
    html+='<div class="chart-bar-group" id="revenueChart">';
    months.forEach(function(m){
      var h=maxRev>0?(monthlyRev[m]/maxRev*200):0;
      html+='<div class="chart-bar" style="height:'+h+'px;" title="'+m+': '+money(monthlyRev[m])+'"></div>';
    });
    html+='</div><div class="chart-labels">';
    months.forEach(function(m){html+='<span>'+m.slice(5)+'</span>';});
    html+='</div>';
  }
  html+='</div></div>';

  // Top products table
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">';
  html+='<div class="card"><div class="card-header"><h3>Top Products</h3></div><div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>Product</th><th>Qty</th><th>Revenue</th></tr></thead><tbody>';
  if(topProducts.length===0) html+='<tr><td colspan="3" class="empty-state">No data</td></tr>';
  else topProducts.forEach(function(p){
    html+='<tr><td>'+escHtml(p.name)+'</td><td>'+p.qty+'</td><td><strong>'+money(p.rev)+'</strong></td></tr>';
  });
  html+='</tbody></table></div></div>';

  // Payment methods
  html+='<div class="card"><div class="card-header"><h3>Payment Methods</h3></div><div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>Method</th><th>Revenue</th><th>%</th></tr></thead><tbody>';
  var payArr=Object.entries(payMethods).sort(function(a,b){return b[1]-a[1];});
  if(payArr.length===0) html+='<tr><td colspan="3" class="empty-state">No data</td></tr>';
  else payArr.forEach(function(p){
    html+='<tr><td>'+escHtml(p[0])+'</td><td><strong>'+money(p[1])+'</strong></td><td>'+pct(totalRev>0?p[1]/totalRev:0)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';
  html+='</div>';

  // Margins table
  html+='<div class="card" style="margin-top:20px;"><div class="card-header"><h3>Product Margins</h3></div><div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>Product</th><th>Price</th><th>Cost</th><th>Profit</th><th>Margin</th></tr></thead><tbody>';
  marginData.forEach(function(p){

  });
  html+='</tbody></table></div></div>';

  return html;
}

function downloadCSV(filename,rows){
  var csv=rows.map(function(r){return r.map(function(c){return '"'+(String(c||'').replace(/"/g,'""'))+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
  toast('Exported '+filename);
}

function exportSalesCSV(){
  var rows=[['Date','Receipt','Product','Qty','Total','Customer','Email','Phone','Payment','Status','Notes']];
  sales.forEach(function(s){
    rows.push([fmtDateTime(s.created_at),s.receipt_number||'',s.products?s.products.name:'',s.quantity||'',s.total||0,s.customer_name||'',s.customer_email||'',s.customer_phone||'',s.payment_method||'',s.status||'completed',s.notes||'']);
  });
  downloadCSV('smart-lawn-sales-'+new Date().toISOString().slice(0,10)+'.csv',rows);
}

function exportProductsCSV(){
  var rows=[['Name','Brand','SKU','Price','Cost','Margin','Qty','Low Threshold','Status']];
  products.forEach(function(p){
    var margin=p.price>0?((p.price-(p.cost||0))/p.price*100).toFixed(1)+'%':'0%';
    rows.push([p.name,p.brand||'',p.sku||'',p.price,p.cost||0,margin,p.quantity,p.low_stock_threshold||5,p.status||'active']);
  });
  downloadCSV('smart-lawn-products-'+new Date().toISOString().slice(0,10)+'.csv',rows);
}

function exportCustomersCSV(){
  var rows=[['Name','Email','Phone','Address','City','State','Zip','Orders','Total Spent','Tags','Notes']];
  customers.forEach(function(c){
    rows.push([c.name,c.email||'',c.phone||'',c.address||'',c.city||'',c.state||'',c.zip||'',c.total_orders||0,c.total_spent||0,(c.tags||[]).join('; '),c.notes||'']);
  });
  downloadCSV('smart-lawn-customers-'+new Date().toISOString().slice(0,10)+'.csv',rows);

function exportInvoicesCSV(){
  var rows=[['Invoice #','Date','Due','Customer','Email','Subtotal','Tax','Discount','Total','Status','Payment','Notes']];

function filterHistory(){
  var q=(document.getElementById('histSearch').value||'').toLowerCase();
  var from=document.getElementById('histFrom').value;
  var to=document.getElementById('histTo').value;
  var rows=document.querySelectorAll('#histTable tbody tr');
  rows.forEach(function(r){
    var text=r.textContent.toLowerCase();
    var date=r.getAttribute('data-date')||'';
    var matchText=!q||text.includes(q);
    var matchFrom=!from||date>=from;
    var matchTo=!to||date<=to;
    r.style.display=(matchText&&matchFrom&&matchTo)?'':'none';
  });
}

function refundSale(id){
  var s=sales.find(function(x){return x.id===id;});
  if(!s)return;
  if(!confirm('Refund '+money(s.total)+' for '+(s.receipt_number||'this sale')+'? Stock will be restored.'))return;

  // Mark sale as refunded
  sb('sales?id=eq.'+id,{method:'PATCH',body:JSON.stringify({status:'refunded',updated_at:new Date().toISOString()})}).then(function(){
    // Restore inventory — get sale items
    return sb('sale_items?sale_id=eq.'+id+'&select=*');
  }).then(function(items){
    var promises=[];
    if(items&&items.length>0){
      items.forEach(function(item){
        var p=products.find(function(x){return x.id===item.product_id;});
        if(p){
          var newQty=p.quantity+item.quantity;
          promises.push(sb('products?id=eq.'+item.product_id,{method:'PATCH',body:JSON.stringify({quantity:newQty,updated_at:new Date().toISOString()})}));
          promises.push(sb('inventory_log',{method:'POST',body:JSON.stringify({product_id:item.product_id,change:item.quantity,reason:'Refund '+(s.receipt_number||'')})}));
        }
      });
    } else if(s.product_id){
      // Single-item sale fallback
      var p=products.find(function(x){return x.id===s.product_id;});
      if(p){
        var newQty=p.quantity+(s.quantity||1);
        promises.push(sb('products?id=eq.'+s.product_id,{method:'PATCH',body:JSON.stringify({quantity:newQty,updated_at:new Date().toISOString()})}));
        promises.push(sb('inventory_log',{method:'POST',body:JSON.stringify({product_id:s.product_id,change:s.quantity||1,reason:'Refund '+(s.receipt_number||'')})}));
      }
    }
    return Promise.all(promises);
  }).then(function(){
    toast('Sale refunded — stock restored');loadAll();
  }).catch(function(e){toast('Refund failed: '+e.message,'error');});
}

function calcPOTotal(){
  var subtotal=0;
  document.querySelectorAll('.po-line').forEach(function(line,i){
    var qty=parseFloat(line.querySelector('[id^="poQty"]').value)||0;
    var cost=parseFloat(line.querySelector('[id^="poCost"]').value)||0;
    subtotal+=qty*cost;
  });
  var shipping=parseFloat(($('poShipping')||{}).value)||0;
  var tax=parseFloat(($('poTax')||{}).value)||0;
  if($('poTotal')) $('poTotal').value=(subtotal+shipping+tax).toFixed(2);
}

function savePO(id){
  var supplier=$('poSupplier').value.trim();
  if(!supplier){toast('Supplier name is required','error');return;}

  // Collect line items
  var lines=[];
  document.querySelectorAll('.po-line').forEach(function(line){
    var prodSel=line.querySelector('[id^="poProduct"]');
    var qtySel=line.querySelector('[id^="poQty"]');
    var costSel=line.querySelector('[id^="poCost"]');
    if(prodSel&&prodSel.value){
      var p=products.find(function(x){return x.id===prodSel.value;});
      lines.push({
        product_id:prodSel.value,
        product_name:p?p.name:'',
        quantity:parseInt(qtySel.value)||1,
        unit_cost:parseFloat(costSel.value)||0,
        total:(parseInt(qtySel.value)||1)*(parseFloat(costSel.value)||0)
      });
    }
  });

  var subtotal=0;lines.forEach(function(l){subtotal+=l.total;});
  var data={
    supplier_name:supplier,
    invoice_number:$('poInvNum').value.trim()||null,
    order_date:$('poDate').value||new Date().toISOString().slice(0,10),
    status:$('poStatus').value,
    subtotal:subtotal,
    shipping:parseFloat($('poShipping').value)||0,
    tax:parseFloat($('poTax').value)||0,
    total:parseFloat($('poTotal').value)||0,
    notes:$('poNotes').value.trim()||null,
    updated_at:new Date().toISOString()
  };

  var url=id?'purchase_orders?id=eq.'+id:'purchase_orders';
  var method=id?'PATCH':'POST';
  sb(url,{method:method,body:JSON.stringify(data)}).then(function(result){
    var poId=id||(result&&result[0]?result[0].id:null);
    var poNum=result&&result[0]?result[0].po_number:(id?'update':'');

    // Insert line items for new POs
    var itemPromise=Promise.resolve();
    if(!id&&poId&&lines.length>0){
      var promises=lines.map(function(l){
        l.po_id=poId;
        return sb('purchase_order_items',{method:'POST',body:JSON.stringify(l)});
      });
      itemPromise=Promise.all(promises);
    }

    return itemPromise.then(function(){
      // Upload file if selected
      var fileInput=$('poFile');
      if(fileInput&&fileInput.files&&fileInput.files[0]&&poId){
        var file=fileInput.files[0];
        var ext=file.name.split('.').pop().toLowerCase();
        var path='purchase-orders/'+poId+'.'+ext;
        return fetch(SB+'/storage/v1/object/documents/'+path,{
          method:'POST',
          headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':file.type,'x-upsert':'true'},
          body:file
        }).then(function(r){
          if(!r.ok) return r.text().then(function(t){console.error('Upload error:',t);});
          var fileUrl=SB+'/storage/v1/object/public/documents/'+path;
          return sb('purchase_orders?id=eq.'+poId,{method:'PATCH',body:JSON.stringify({file_url:fileUrl})});
        });
      }
    });
  }).then(function(){
    closeModal();toast(id?'PO updated':'PO created');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

function deletePO(id){
  if(!confirm('Delete this purchase order?'))return;
  sb('purchase_orders?id=eq.'+id,{method:'DELETE'}).then(function(){
    closeModal();toast('PO deleted');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

function receivePO(id){
  var po=purchaseOrders.find(function(x){return x.id===id;});
  if(!po)return;
  if(!confirm('Mark '+po.po_number+' as received? This will update inventory.'))return;

  // Mark received
  sb('purchase_orders?id=eq.'+id,{method:'PATCH',body:JSON.stringify({status:'received',received_date:new Date().toISOString().slice(0,10),updated_at:new Date().toISOString()})}).then(function(){
    // Get PO items and add to inventory
    return sb('purchase_order_items?po_id=eq.'+id+'&select=*');
  }).then(function(items){
    var promises=[];
    if(items&&items.length){
      items.forEach(function(item){
        var p=products.find(function(x){return x.id===item.product_id;});
        if(p){
          var newQty=p.quantity+item.quantity;
          promises.push(sb('products?id=eq.'+item.product_id,{method:'PATCH',body:JSON.stringify({quantity:newQty,cost:item.unit_cost,updated_at:new Date().toISOString()})}));
          promises.push(sb('inventory_log',{method:'POST',body:JSON.stringify({product_id:item.product_id,change:item.quantity,reason:'PO Received '+po.po_number})}));
        }
      });
    }
    return Promise.all(promises);
  }).then(function(){
    toast('PO received — inventory updated');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

function exportPOsCSV(){
  var rows=[['PO #','Date','Supplier','Invoice #','Subtotal','Shipping','Tax','Total','Status','Notes']];
  purchaseOrders.forEach(function(po){
    rows.push([po.po_number||'',fmtDate(po.order_date),po.supplier_name,po.invoice_number||'',po.subtotal||0,po.shipping||0,po.tax||0,po.total||0,po.status,po.notes||'']);
  });
  downloadCSV('smart-lawn-purchase-orders-'+new Date().toISOString().slice(0,10)+'.csv',rows);
}

function saveTicket(id){
  var data={
    customer_id:$('tCust').value||null,
    product_id:$('tProd').value||null,
    serial_number_id:$('tSN').value||null,
    type:$('tType').value,
    priority:$('tPri').value,
    status:$('tStatus').value,
    description:$('tDesc').value.trim()||null,
    resolution:$('tRes').value.trim()||null,
    labor_hours:parseFloat($('tHours').value)||0,
    parts_cost:parseFloat($('tParts').value)||0,
    labor_cost:parseFloat($('tLabor').value)||0,
    total_cost:(parseFloat($('tParts').value)||0)+(parseFloat($('tLabor').value)||0),
    is_warranty:$('tWarranty').checked,
    scheduled_date:$('tSchedule').value||null,
    completed_date:$('tStatus').value==='completed'?new Date().toISOString().slice(0,10):null,
    updated_at:new Date().toISOString()
  };
  if(data.is_warranty) data.total_cost=0;

  var url=id?'service_tickets?id=eq.'+id:'service_tickets';
  var method=id?'PATCH':'POST';
  sb(url,{method:method,body:JSON.stringify(data)}).then(function(){
    closeModal();toast(id?'Ticket updated':'Ticket created');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

function deleteTicket(id){
  if(!confirm('Delete this service ticket?'))return;
  sb('service_tickets?id=eq.'+id,{method:'DELETE'}).then(function(){
    closeModal();toast('Ticket deleted');loadAll();
  }).catch(function(e){toast('Error: '+e.message,'error');});
}

function exportServiceCSV(){
  var rows=[['Ticket','Date','Type','Customer','Product','Serial','Priority','Status','Labor Hrs','Parts $','Labor $','Total','Warranty','Description','Resolution']];
  serviceTickets.forEach(function(t){
    var custName='';if(t.customer_id){var c=customers.find(function(x){return x.id===t.customer_id;});if(c)custName=c.name;}
    var prodName='';if(t.product_id){var p=products.find(function(x){return x.id===t.product_id;});if(p)prodName=p.name;}
    var snNum='';if(t.serial_number_id){var sn=serialNumbers.find(function(x){return x.id===t.serial_number_id;});if(sn)snNum=sn.serial_number;}
    rows.push([t.ticket_number||'',fmtDate(t.created_at),t.type,custName,prodName,snNum,t.priority,t.status,t.labor_hours,t.parts_cost,t.labor_cost,t.total_cost,t.is_warranty?'Yes':'No',t.description||'',t.resolution||'']);
  });
  downloadCSV('smart-lawn-service-'+new Date().toISOString().slice(0,10)+'.csv',rows);
}

function autoFillSubCust(){
  var custId=$('sCust').value;
  if(custId){var c=customers.find(function(x){return x.id===custId;});if(c)$('sCustName').value=c.name;}
}

function autoFillSubRate(){
  var plan=$('sPlan').value;
  var rates={'Small':129,'Medium':199,'Large':249,'XL':349,'Commercial':449,'Fleet':599};
  for(var k in rates){if(plan.includes(k)){$('sRate').value=rates[k];break;}}
}

function handleCSVImport(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    var lines=text.split('\n').map(function(l){return l.trim();}).filter(Boolean);
    if(lines.length<2){toast('CSV needs a header row + at least 1 data row','error');return;}
    var headers=lines[0].split(',').map(function(h){return h.trim().replace(/"/g,'').toLowerCase();});
    var nameIdx=headers.indexOf('name');
    var priceIdx=headers.indexOf('price');
    if(nameIdx===-1||priceIdx===-1){toast('CSV must have "name" and "price" columns','error');return;}

    var items=[];
    for(var i=1;i<lines.length;i++){
      var cols=lines[i].match(/(".*?"|[^,]+)/g);
      if(!cols)continue;
      cols=cols.map(function(c){return c.trim().replace(/^"|"$/g,'');});
      var item={
        name:cols[nameIdx]||'',
        brand:cols[headers.indexOf('brand')]||'',
        sku:cols[headers.indexOf('sku')]||'',
        price:parseFloat(cols[priceIdx])||0,
        cost:parseFloat(cols[headers.indexOf('cost')])||0,
        quantity:parseInt(cols[headers.indexOf('quantity')])||0,
        low_stock_threshold:parseInt(cols[headers.indexOf('low_stock_threshold')])||5,
        description:cols[headers.indexOf('description')]||'',
        status:cols[headers.indexOf('status')]||'active'
      };
      if(item.name&&item.price>0) items.push(item);
    }

    if(items.length===0){toast('No valid products found in CSV','error');return;}

    // Preview
    var html='<div style="font-weight:700;margin-bottom:8px;">Preview: '+items.length+' products to import</div>';
    html+='<div style="max-height:200px;overflow-y:auto;border:1px solid var(--g200);border-radius:8px;"><table class="data-table"><thead><tr><th>Name</th><th>Brand</th><th>SKU</th><th>Price</th><th>Cost</th><th>Qty</th></tr></thead><tbody>';
    items.forEach(function(p){
      html+='<tr><td>'+escHtml(p.name)+'</td><td>'+escHtml(p.brand)+'</td><td class="mono">'+escHtml(p.sku)+'</td><td>'+money(p.price)+'</td><td>'+money(p.cost)+'</td><td>'+p.quantity+'</td></tr>';
    });
    html+='</tbody></table></div>';
    html+='<button class="btn btn-primary" onclick="confirmCSVImport()" style="margin-top:12px;"><i class="fas fa-upload"></i> Import '+items.length+' Products</button>';
    document.getElementById('csvPreview').innerHTML=html;
    window._csvImportItems=items;
  };
  reader.readAsText(file);
}

function confirmCSVImport(){
  var items=window._csvImportItems;
  if(!items||!items.length)return;
  toast('Importing '+items.length+' products...');
  var promises=items.map(function(item){
    return sb('products',{method:'POST',body:JSON.stringify(item)});
  });
  Promise.all(promises).then(function(){
    toast(items.length+' products imported!');
    document.getElementById('csvPreview').innerHTML='<div style="color:var(--green);font-weight:700;"><i class="fas fa-check-circle"></i> '+items.length+' products imported successfully</div>';
    window._csvImportItems=null;
    loadAll();
  }).catch(function(e){toast('Import error: '+e.message,'error');});
}

function doGlobalSearch(){
  var q=(document.getElementById('globalSearch').value||'').toLowerCase().trim();
  var results=document.getElementById('globalResults');
  if(!q||q.length<2){results.innerHTML='';results.style.display='none';return;}
  results.style.display='block';

  var hits=[];
  // Products
  products.forEach(function(p){
    if((p.name||'').toLowerCase().includes(q)||(p.sku||'').toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q)){
      hits.push({type:'product',icon:'fa-box',color:'var(--green)',label:p.name,sub:p.sku||p.brand||'',action:"go('products')"});
    }
  });
  // Customers
  customers.forEach(function(c){
    if((c.name||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)||(c.phone||'').toLowerCase().includes(q)){
      hits.push({type:'customer',icon:'fa-user',color:'var(--blue)',label:c.name,sub:c.email||c.phone||'',action:"viewCustomer('"+c.id+"')"});
    }
  });
  // Orders
  orders.forEach(function(o){
    if((o.order_number||'').toLowerCase().includes(q)||(o.customer_name||'').toLowerCase().includes(q)){
      hits.push({type:'order',icon:'fa-truck',color:'var(--purple)',label:o.order_number||'Order',sub:o.customer_name||'',action:"go('orders')"});
    }
  });
  // Invoices
  invoices.forEach(function(i){
    if((i.invoice_number||'').toLowerCase().includes(q)||(i.customer_name||'').toLowerCase().includes(q)){
      hits.push({type:'invoice',icon:'fa-file-invoice',color:'var(--orange)',label:i.invoice_number||'Invoice',sub:i.customer_name||'',action:"go('invoices')"});
    }
  });
  // Sales
  sales.forEach(function(s){
    if((s.receipt_number||'').toLowerCase().includes(q)||(s.customer_name||'').toLowerCase().includes(q)){
      hits.push({type:'sale',icon:'fa-receipt',color:'var(--teal)',label:s.receipt_number||'Sale',sub:s.customer_name||money(s.total),action:"go('history')"});
    }
  });

  if(hits.length===0){
    results.innerHTML='<div style="padding:16px;text-align:center;color:var(--g400);font-size:.85rem;">No results for "'+escHtml(q)+'"</div>';
    return;
  }

  var html='';
  hits.slice(0,12).forEach(function(h){
    html+='<div onclick="'+h.action+';closeGlobalSearch()" style="padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--g100);transition:background .15s;" onmouseover="this.style.background=\'var(--g50)\'" onmouseout="this.style.background=\'none\'">';
    html+='<i class="fas '+h.icon+'" style="color:'+h.color+';width:20px;text-align:center;"></i>';
    html+='<div style="flex:1;min-width:0;"><div style="font-size:.88rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escHtml(h.label)+'</div>';
    if(h.sub) html+='<div style="font-size:.75rem;color:var(--g400);">'+escHtml(h.sub)+'</div>';
    html+='</div>';
    html+='<span class="badge-gray" style="font-size:.65rem;">'+h.type+'</span>';
    html+='</div>';
  });
  if(hits.length>12) html+='<div style="padding:8px;text-align:center;font-size:.75rem;color:var(--g400);">+'+(hits.length-12)+' more results</div>';
  results.innerHTML=html;

function generateBarcodeSVG(text){
  // Simple Code 128B barcode generator (SVG)
  var CODE128B=[
    '11011001100','11001101100','11001100110','10010011000','10010001100',
    '10001001100','10011001000','10011000100','10001100100','11001001000',
    '11001000100','11000100100','10110011100','10011011100','10011001110',
    '10111001100','10011101100','10011100110','11001110010','11001011100',
    '11001001110','11011100100','11001110100','11100101100','11100100110',
    '11101100100','11100110100','11100110010','11011011000','11011000110',
    '11000110110','10100011000','10001011000','10001000110','10110001000',
    '10001101000','10001100010','11010001000','11000101000','11000100010',
    '10110111000','10110001110','10001101110','10111011000','10111000110',
    '10001110110','11101110110','11010001110','11000101110','11011101000',
    '11011100010','11011101110','11101011000','11101000110','11100010110',
    '11101101000','11101100010','11100011010','11101111010','11001000010',
    '11110001010','10100110000','10100001100','10010110000','10010000110',
    '10000101100','10000100110','10110010000','10110000100','10011010000',
    '10011000010','10000110100','10000110010','11000010010','11001010000',
    '11110111010','11000010100','10001111010','10100111100','10010111100',
    '10010011110','10111100100','10011110100','10011110010','11110100100',
    '11110010100','11110010010','11011011110','11011110110','11110110110',
    '10101111000','10100011110','10001011110','10111101000','10111100010',
    '10001111010','11110101000','11110100010','10111011110','10111101110',
    '11101011110','11110101110','11010000100','11010010000','11010011100',
    '1100011101011'
  ];
  var startB=104;
  var checksum=startB;
  var bars=CODE128B[startB];
  for(var i=0;i<text.length;i++){
    var code=text.charCodeAt(i)-32;
    if(code<0||code>95) code=0;
    bars+=CODE128B[code];
    checksum+=(i+1)*code;
  }
  bars+=CODE128B[checksum%103];
  bars+=CODE128B[106]; // stop

  var w=bars.length;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+w+' 60" width="'+w*2+'" height="120">';
  svg+='<rect width="100%" height="100%" fill="white"/>';
  for(var j=0;j<bars.length;j++){
    if(bars[j]==='1') svg+='<rect x="'+j+'" y="0" width="1" height="50" fill="black"/>';
  }
  svg+='<text x="'+(w/2)+'" y="58" text-anchor="middle" font-family="monospace" font-size="8">'+text.replace(/</g,'&lt;')+'</text>';
  svg+='</svg>';
  return svg;
}

// ====================================================================
function generateWeeklyReport(){
  var now=new Date();
  var weekAgo=new Date(now-7*86400000);
  var weekStr=weekAgo.toLocaleDateString()+' — '+now.toLocaleDateString();

  // This week's sales
  var weekSales=sales.filter(function(s){return s.status!=='voided'&&s.status!=='refunded'&&new Date(s.created_at)>=weekAgo;});
  var weekRev=0;weekSales.forEach(function(s){weekRev+=Number(s.total)||0;});

  // This week's orders
  var weekOrders=orders.filter(function(o){return new Date(o.created_at)>=weekAgo;});

  // Low stock
  var lowItems=products.filter(function(p){return p.quantity>0&&p.quantity<=(p.low_stock_threshold||5);});
  var outItems=products.filter(function(p){return p.quantity<=0&&p.status==='active';});

  // Open tickets
  var openTickets=serviceTickets.filter(function(t){return t.status==='open'||t.status==='in_progress';});

  // Active subs
  var activeSubs=subscriptions.filter(function(s){return s.status==='active';});
  var mrr=0;activeSubs.forEach(function(s){mrr+=Number(s.monthly_rate)||0;});

  var html='<div style="font-size:.9rem;line-height:1.7;">';
  html+='<h3 style="margin-bottom:16px;">📊 Week of '+weekStr+'</h3>';

  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;">';
  html+='<div style="background:var(--green-light);padding:16px;border-radius:10px;text-align:center;"><div style="font-size:.7rem;font-weight:600;color:#166534;">REVENUE</div><div style="font-size:1.3rem;font-weight:800;color:#166534;">'+money(weekRev)+'</div><div style="font-size:.72rem;color:#166534;">'+weekSales.length+' sale'+(weekSales.length!==1?'s':'')+'</div></div>';
  html+='<div style="background:var(--g100);padding:16px;border-radius:10px;text-align:center;"><div style="font-size:.7rem;font-weight:600;color:var(--g600);">MaaS MRR</div><div style="font-size:1.3rem;font-weight:800;">'+money(mrr)+'</div><div style="font-size:.72rem;color:var(--g500);">'+activeSubs.length+' active</div></div>';
  html+='<div style="background:var(--g100);padding:16px;border-radius:10px;text-align:center;"><div style="font-size:.7rem;font-weight:600;color:var(--g600);">OPEN TICKETS</div><div style="font-size:1.3rem;font-weight:800;color:'+(openTickets.length>0?'var(--orange)':'var(--green)')+';">'+openTickets.length+'</div></div>';
  html+='</div>';

  if(outItems.length>0){
    html+='<div style="background:#fef2f2;padding:12px 16px;border-radius:8px;margin-bottom:12px;"><strong style="color:var(--red);">⚠️ Out of stock:</strong> '+outItems.map(function(p){return escHtml(p.name);}).join(', ')+'</div>';
  }
  if(lowItems.length>0){
    html+='<div style="background:#fffbeb;padding:12px 16px;border-radius:8px;margin-bottom:12px;"><strong style="color:var(--orange);">⚡ Low stock:</strong> '+lowItems.map(function(p){return escHtml(p.name)+' ('+p.quantity+')';}).join(', ')+'</div>';
  }

  html+='<div style="margin-top:16px;color:var(--g500);font-size:.82rem;">Total inventory: '+products.reduce(function(a,p){return a+p.quantity;},0)+' units — Value: '+money(products.reduce(function(a,p){return a+p.quantity*p.price;},0))+'</div>';
  html+='</div>';

  openModal('Weekly Report',html,'<button class="btn btn-outline" onclick="closeModal()">Close</button> <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print"></i> Print</button>');
}
</script>
</body>
</html>
